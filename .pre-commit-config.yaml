repos:
  - repo: local
    hooks:
      - id: run-black
        name: Run Black
        entry: /usr/local/bin/python -m black .
        language: system
        pass_filenames: false

      - id: run-mypy
        name: Run Mypy
        entry: /usr/local/bin/python -m mypy .
        language: system
        pass_filenames: false

      - id: run-pylint
        name: Run Pylint
        entry: /usr/local/bin/python -m pylint .
        language: system
        pass_filenames: false